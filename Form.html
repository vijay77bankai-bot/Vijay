<!DOCTYPE html>
<html>
<head>
  <title>form</title>
</head>
<body>
  <center>
  <img src="img/zoho(2).jpg" width="200">
	<h2>We Are Hiring – 3D Modeling & Animation Team🚀</h2>
	<h3> By Vijay | Inspired by Zoho Innovation</h3>
	</center> <hr>
	<center>
	<h2>
	<i>👒Registration Form</i>
	</h2>
	</center>
	<center>
	<table>
	  <tr>
	    <td> Name:</td>
	    <td> <input type="text" placeholder="Enter Your Name"></td>
	  </tr>
	  <tr>
	    <td> Age:</td>
	    <td> <input type="number" placeholder="Enter Your Age"></td>
	  </tr>
	  <tr>
	    <td>Gender:</td>
	    <td> <input type="radio"name=Gender>Male
	    <input type="radio"name=Gender>Female</td>
	  </tr>
	  <tr>
	    <td>Email:</td>
	    <td> <input type="email" placeholder="Enter Your Email"></td>
	  </tr>
	  <tr>
	    <td>Phone Number:</td>
	    <td> <input type="number" placeholder="Enter Your Number"></td>
	  </tr>
	  <tr>
	    <td>Role Selection:</td>
	    <td>
	      <select>
	        <option> 3D Modeler</option>
	        <option> Animator</option>
	        <option> Design Assistant</option>
	      </select>
	    </td>
	  </tr>
	  <tr>
	    <td> Skill Selection:</td>
	    <td> <input type="checkbox"> Maya
	         <input type="checkbox"> Photoshop
	         <input type="checkbox">Blender</td>
	  </tr>
	  <tr>
	    <td>Experience Level:</td> 
	    <td> 
	    <select>
	      <option>Beginner</option>
	      <option>Basic</option>
	      <option> Fresher</option>
	    </select>
	    </td>
	  </tr>
	  <tr>
	    <td>Upload Resume:</td>
	    <td> <input type="file"> </td>
	  </tr>
	  <tr>
	    <td> Short Massage:</td>
	    <td> <input type="message" placeholder="Enter Your Text"></td>
	  </tr>
	  <tr>
	    <td><input type="submit"> </td>
	  </tr>
	</table>
	</center>
	
</body>
</html>
